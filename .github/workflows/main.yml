name: VCAM Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve git conflict markers
        run: |
          for f in $(grep -rl "<<<<<<< HEAD" . --include="*.x" --include="*.m" --include="*.h" 2>/dev/null); do
            echo "Fixing conflict markers in: $f"
            perl -i -0pe '
              s/<<<<<<< [^\n]*\n(.*?)=======\n.*?>>>>>>> [^\n]*\n/$1/gs
            ' "$f"
          done

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: brew install ldid dpkg

      - name: Install SDK
        run: |
          mkdir -p "$HOME/theos/sdks"
          curl -L https://github.com/theos/sdks/archive/master.zip -o master.zip
          unzip -q master.zip
          find sdks-master -maxdepth 1 -type d -name "*.sdk" -exec mv {} "$HOME/theos/sdks/" \;
          rm -rf master.zip sdks-master

      - name: Build
        run: |
          export THEOS="$HOME/theos"
          make clean
          make package FINALPACKAGE=1

      - name: Inspect .deb contents
        run: |
          set -e
          DEB=$(ls packages/*.deb | head -n1)
          echo "Found: $DEB"

          mkdir -p _inspect && cd _inspect
          ar x "../$DEB"
          mkdir -p data
          if   [ -f data.tar.xz   ]; then tar -xJf data.tar.xz   -C data;
          elif [ -f data.tar.gz   ]; then tar -xzf data.tar.gz   -C data;
          elif [ -f data.tar.zst  ]; then zstd -d  data.tar.zst -o data.tar && tar -xf data.tar -C data;
          elif [ -f data.tar.lzma ]; then tar --lzma -xf data.tar.lzma -C data;
          else                            tar -xf data.tar       -C data;
          fi

          echo "===== file tree inside .deb ====="
          (cd data && find . -type f | sort)

          echo ""
          echo "===== sanity checks ====="
          DYLIB=data/var/jb/Library/MobileSubstrate/DynamicLibraries/MediaPlaybackUtils.dylib
          PLIST=data/var/jb/Library/MobileSubstrate/DynamicLibraries/MediaPlaybackUtils.plist
          BUNDLE=data/var/jb/Library/PreferenceBundles/MediaPlaybackUtils.bundle/MediaPlaybackUtils
          PREFENTRY=data/var/jb/Library/PreferenceLoader/Preferences/MediaPlaybackUtils.plist

          [ -f "$DYLIB" ]     && echo "OK   dylib:        $DYLIB"     || echo "FAIL dylib missing:       $DYLIB"
          [ -f "$PLIST" ]     && echo "OK   filter plist: $PLIST"     || echo "FAIL filter plist:        $PLIST"
          [ -f "$BUNDLE" ]    && echo "OK   pref bundle:  $BUNDLE"    || echo "FAIL pref bundle binary:  $BUNDLE"
          [ -f "$PREFENTRY" ] && echo "OK   pref entry:   $PREFENTRY" || echo "FAIL pref entry plist:    $PREFENTRY"

          echo ""
          echo "===== dylib hook symbols ====="
          if [ -f "$DYLIB" ]; then
            nm -gU "$DYLIB" 2>/dev/null | grep -Ei 'kyc|antifraud|webrtc|stealth|jailbreak|browser|photocapture' || echo "(no matching symbols found — significant hooks may be missing!)"
          fi

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: MediaPlaybackUtils_deb
          path: packages/*.deb
          if-no-files-found: error
