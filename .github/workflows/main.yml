name: VCAM Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve git conflict markers
        run: |
          for f in $(grep -rl "<<<<<<< HEAD" . --include="*.x" --include="*.m" --include="*.h" 2>/dev/null); do
            echo "Fixing conflict markers in: $f"
            perl -i -0pe '
              s/<<<<<<< [^\n]*\n(.*?)=======\n.*?>>>>>>> [^\n]*\n/$1/gs
            ' "$f"
          done

      - name: Fix Makefile tabs
        run: |
          for f in Makefile prefs/Makefile; do
            if [ -f "$f" ]; then
              echo "Fixing tabs in: $f"
              # convert any run of 2-8 leading spaces in front of non-space chars to a single TAB
              perl -i -pe 's/^( {2,8})(?=\S)/\t/' "$f"
              echo "--- $f (last 10 lines, ^I = TAB) ---"
              cat -A "$f" | tail -10
            fi
          done

      - name: Strip BOM and stray non-ASCII from source files
        run: |
          for f in $(find . -type f \( -name "*.x" -o -name "*.m" -o -name "*.h" \)); do
            # strip UTF-8 BOM (EF BB BF) from start of file if present
            perl -i -pe 'BEGIN{undef $/;} s/^\xEF\xBB\xBF//' "$f"
          done

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: brew install ldid

      - name: Install SDK
        run: |
          mkdir -p "$HOME/theos/sdks"
          curl -L https://github.com/theos/sdks/archive/master.zip -o master.zip
          unzip -q master.zip
          find sdks-master -maxdepth 1 -type d -name "*.sdk" -exec mv {} "$HOME/theos/sdks/" \;
          rm -rf master.zip sdks-master
          echo "--- SDKs installed ---"
          ls -la "$HOME/theos/sdks/"

      - name: Build
        run: |
          export THEOS="$HOME/theos"
          make clean
          make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: MediaPlaybackUtils_deb
          path: packages/*.deb
          if-no-files-found: error
