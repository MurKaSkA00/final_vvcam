name: VCAM Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve git conflict markers
        run: |
          for f in $(grep -rl "<<<<<<< HEAD" . --include="*.x" --include="*.m" --include="*.h" 2>/dev/null); do
            echo "Fixing conflict markers in: $f"
            perl -i -0pe '
              s/<<<<<<< [^\n]*\n(.*?)=======\n.*?>>>>>>> [^\n]*\n/$1/gs
            ' "$f"
          done

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: brew install ldid dpkg

      - name: Install SDK
        run: |
          mkdir -p "$HOME/theos/sdks"
          curl -L https://github.com/theos/sdks/archive/master.zip -o master.zip
          unzip -q master.zip
          find sdks-master -maxdepth 1 -type d -name "*.sdk" -exec mv {} "$HOME/theos/sdks/" \;
          rm -rf master.zip sdks-master

      - name: Build
        run: |
          export THEOS="$HOME/theos"
          make clean
          make package FINALPACKAGE=1

      - name: Inspect .deb contents
        run: |
          echo "===== package list ====="
          ls -la packages/
          DEB=$(ls packages/*.deb | head -1)
          echo "===== control metadata ====="
          dpkg-deb -I "$DEB" || true
          echo "===== file tree inside .deb (must be under /var/jb on rootless) ====="
          dpkg-deb -c "$DEB"
          echo "===== sanity checks ====="
          dpkg-deb -c "$DEB" | grep -q "/var/jb/Library/PreferenceLoader/Preferences/MediaPlaybackUtils.plist" \
            && echo "OK: PreferenceLoader entry present" || echo "FAIL: PreferenceLoader entry MISSING"
          dpkg-deb -c "$DEB" | grep -q "/var/jb/Library/PreferenceBundles/MediaPlaybackUtils.bundle" \
            && echo "OK: Preference bundle present" || echo "FAIL: Preference bundle MISSING"
          dpkg-deb -c "$DEB" | grep -q "/var/jb/Library/PreferenceLoader/Preferences/icon" \
            && echo "OK: icon next to entry present" || echo "FAIL: icon next to entry MISSING"
          dpkg-deb -c "$DEB" | grep -q "DynamicLibraries/MediaPlaybackUtils.dylib" \
            && echo "OK: tweak dylib present" || echo "FAIL: tweak dylib MISSING"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: MediaPlaybackUtils_deb
          path: packages/*.deb
          if-no-files-found: error
