name: VCAM Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve git conflict markers
        run: |
          for f in $(grep -rl "<<<<<<< HEAD" . --include="*.x" --include="*.m" --include="*.h" 2>/dev/null); do
            echo "Fixing conflict markers in: $f"
            perl -i -0pe '
              s/<<<<<<< [^\n]*\n(.*?)=======\n.*?>>>>>>> [^\n]*\n/$1/gs
            ' "$f"
          done

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: brew install ldid git-lfs

      - name: Install SDK (with Git LFS)
        run: |
          git lfs install
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cd /tmp/theos-sdks
          git lfs pull
          mkdir -p "$HOME/theos/sdks"
          find . -maxdepth 1 -type d -name "*.sdk" -exec cp -R {} "$HOME/theos/sdks/" \;
          rm -rf /tmp/theos-sdks
          echo "Installed SDKs:"
          ls "$HOME/theos/sdks"

      - name: Verify Preferences framework is present
        run: |
          SDK_DIR=$(ls -d "$HOME"/theos/sdks/iPhoneOS*.sdk | sort -V | tail -1)
          echo "Using SDK: $SDK_DIR"
          PF="$SDK_DIR/System/Library/PrivateFrameworks/Preferences.framework"
          if [ ! -e "$PF/Preferences.tbd" ] && [ ! -e "$PF/Preferences" ]; then
            echo "ERROR: Preferences.framework stub is missing in $PF" >&2
            ls -la "$PF" || true
            exit 1
          fi
          # Reject LFS pointer files (they start with "version https://git-lfs")
          if [ -f "$PF/Preferences.tbd" ] && head -1 "$PF/Preferences.tbd" | grep -q "git-lfs"; then
            echo "ERROR: Preferences.tbd is an LFS pointer, not the real file" >&2
            exit 1
          fi
          echo "OK: Preferences framework stub is valid."

      - name: Build
        run: |
          export THEOS="$HOME/theos"
          make clean
          make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: MediaPlaybackUtils_deb
          path: packages/*.deb
          if-no-files-found: error
